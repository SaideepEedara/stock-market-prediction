name: Stock Market CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-test-and-push:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout repository
    - name: Checkout code
      uses: actions/checkout@v4


    # 2️⃣ Setup Node
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18


    # 3️⃣ Install Backend Dependencies
    - name: Install Backend Dependencies
      run: |
        cd mern-auth/backend
        npm install


    # 4️⃣ Install Frontend Dependencies
    - name: Install Frontend Dependencies
      run: |
        cd mern-auth/frontend
        npm install


    # 5️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    # 6️⃣ Install ML Dependencies
    - name: Install ML Dependencies
      run: |
        cd stock-ml-service
        pip install -r requirements.txt


    # 7️⃣ Create Backend .env File
    - name: Create backend environment file
      run: |
        echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> mern-auth/backend/.env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> mern-auth/backend/.env


    # 8️⃣ Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    # 9️⃣ Build Docker Images
    - name: Build Docker Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/stock-backend ./mern-auth/backend
        docker build -t ${{ secrets.DOCKER_USERNAME }}/stock-frontend ./mern-auth/frontend
        docker build -t ${{ secrets.DOCKER_USERNAME }}/stock-ml-service ./stock-ml-service


    # 🔟 Push Docker Images to DockerHub
    - name: Push Images to DockerHub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/stock-backend
        docker push ${{ secrets.DOCKER_USERNAME }}/stock-frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/stock-ml-service


    # 1️⃣1️⃣ Build Docker Compose (integration test)
    - name: Build Docker Containers
      run: docker compose build


    # 1️⃣2️⃣ Run Containers
    - name: Run Containers
      run: |
        docker compose up -d
        sleep 25
        docker compose ps


    # 1️⃣3️⃣ Stop Containers
    - name: Stop Containers
      run: docker compose down